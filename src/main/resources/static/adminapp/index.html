<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 80px; }
        form { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { padding: 8px; font-size: 14px; }
        button { padding: 8px; font-size: 14px; cursor: pointer; }
        .error { color: #b00020; font-size: 13px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function LoginApp() {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(false);

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                try {
                    const res = await fetch("/admin/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        setSuccess(true);
                    } else {
                        setError((body.errors && body.errors[0]) || "Login failed");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            if (success) {
                return <h1>success</h1>;
            }

            return (
                <form onSubmit={handleSubmit}>
                    <h2>Admin Login</h2>
                    <input
                        type="email"
                        placeholder="Email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                    />
                    <input
                        type="password"
                        placeholder="Password"
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                    />
                    <button type="submit">Log in</button>
                    {error && <div className="error">{error}</div>}
                </form>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<LoginApp />);
    </script>
</body>
</html>
