<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; }

        /* Login */
        .login-wrap { display: flex; justify-content: center; padding-top: 80px; }
        form { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { padding: 8px; font-size: 14px; }
        button { padding: 8px; font-size: 14px; cursor: pointer; }
        .error { color: #b00020; font-size: 13px; }

        /* App shell */
        .shell { display: flex; min-height: 100vh; }
        .navbar { width: 200px; background: #1e293b; color: #fff; display: flex; flex-direction: column; }
        .nav-item { padding: 14px 18px; cursor: pointer; border: none; background: none; color: #cbd5e1;
                    text-align: left; font-size: 15px; }
        .nav-item:hover { background: #334155; color: #fff; }
        .nav-item.active { background: #334155; color: #fff; font-weight: bold; }
        .nav-subheader { padding: 16px 18px 4px; color: #64748b; font-size: 11px;
                         text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-item.sub { padding-left: 32px; font-size: 14px; }
        .content { flex: 1; padding: 24px; }
        select { padding: 8px; font-size: 14px; }
        .name-row { display: flex; gap: 8px; align-items: center; }

        .admin-row { padding: 8px 0; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
        .admin-row:hover { background: #f1f5f9; }
        .admin-row .name { font-weight: bold; }
        .admin-row .meta { color: #475569; font-size: 13px; }
        .admin-row.deleted, .admin-row.deleted .name, .admin-row.deleted .meta { color: #94a3b8; }
        .admin-row .deleted-tag { color: #b00020; font-size: 12px; margin-left: 8px; }
        .admin-row.deleted .deleted-tag { color: #94a3b8; }

        .back-link { background: none; border: none; color: #2563eb; cursor: pointer;
                     padding: 0; font-size: 14px; margin-bottom: 16px; }
        .detail-field { padding: 6px 0; font-size: 15px; }
        .detail-field .label { color: #475569; }
        .danger { background: #b00020; color: #fff; border: none; margin-top: 24px; }

        .detail-header { display: flex; justify-content: space-between; align-items: center; }
        .edit-form { display: flex; flex-direction: column; gap: 12px; max-width: 320px; margin-top: 12px; }
        .edit-form label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function LoginApp({ onLogin }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState(null);

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                try {
                    const res = await fetch("/admin/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onLogin(body.data.session, body.data.admin);
                    } else {
                        setError((body.errors && body.errors[0]) || "Login failed");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            return (
                <div className="login-wrap">
                    <form onSubmit={handleSubmit}>
                        <h2>Admin Login</h2>
                        <input type="email" placeholder="Email" value={email}
                               onChange={(e) => setEmail(e.target.value)} />
                        <input type="password" placeholder="Password" value={password}
                               onChange={(e) => setPassword(e.target.value)} />
                        <button type="submit">Log in</button>
                        {error && <div className="error">{error}</div>}
                    </form>
                </div>
            );
        }

        function AdminDetail({ admin, currentAdmin, token, onBack, onSaved, onDeleted }) {
            const canAssign = currentAdmin.permissions.includes("ASSIGN_ADMIN_ROLES");
            const currentRoleIds = admin.roleMemberships.map((m) => m.roleId);
            const [roles, setRoles] = useState(null);
            const [checked, setChecked] = useState(currentRoleIds);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!canAssign) return;
                async function loadRoles() {
                    try {
                        const res = await fetch("/admin/roles", {
                            headers: { "Authorization": "Bearer " + token },
                        });
                        const body = await res.json();
                        if (body.errorType === "NONE") {
                            // Root can only be assigned directly in the db.
                            setRoles(body.data.filter((r) => r.name !== "Root"));
                        } else {
                            setError((body.errors && body.errors[0]) || "Could not load roles");
                        }
                    } catch (err) { setError("Could not reach the server"); }
                }
                loadRoles();
            }, [canAssign, token]);

            function toggle(roleId) {
                setChecked((prev) => prev.includes(roleId) ? prev.filter((x) => x !== roleId) : [...prev, roleId]);
            }

            async function handleSave() {
                setError(null);
                try {
                    const toAdd = checked.filter((rid) => !currentRoleIds.includes(rid));
                    const toRemove = admin.roleMemberships.filter((m) => !checked.includes(m.roleId));
                    for (const roleId of toAdd) {
                        const res = await fetch("/admin/role-memberships", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                            body: JSON.stringify({ adminId: admin.id, roleId }),
                        });
                        const body = await res.json();
                        if (body.errorType !== "NONE") {
                            setError((body.errors && body.errors.join(", ")) || "Could not assign role");
                            return;
                        }
                    }
                    for (const m of toRemove) {
                        const res = await fetch("/admin/role-memberships/" + m.membershipId, {
                            method: "DELETE",
                            headers: { "Authorization": "Bearer " + token },
                        });
                        const body = await res.json();
                        if (body.errorType !== "NONE") {
                            setError((body.errors && body.errors.join(", ")) || "Could not remove role");
                            return;
                        }
                    }
                    onSaved();
                } catch (err) { setError("Could not reach the server"); }
            }

            async function handleDelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/admins/" + admin.id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onDeleted();
                    } else {
                        setError((body.errors && body.errors[0]) || "Could not delete admin");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to admins</button>
                    <div className="detail-header">
                        <h1>{admin.name}</h1>
                        {canAssign && <button onClick={handleSave}>Save</button>}
                    </div>
                    <div className="detail-field"><span className="label">Email:</span> {admin.email}</div>
                    <div className="detail-field"><span className="label">Phone:</span> {admin.phone}</div>
                    {canAssign && (
                        <div>
                            <h3>Roles</h3>
                            {!roles && !error && <div>Loading…</div>}
                            {roles && (
                                <div className="edit-form">
                                    {roles.map((r) => (
                                        <label key={r.id} style={{ flexDirection: "row", alignItems: "center", gap: "8px" }}>
                                            <input type="checkbox" checked={checked.includes(r.id)} onChange={() => toggle(r.id)} />
                                            {r.name}
                                        </label>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                    {currentAdmin.permissions.includes("DELETE_ADMIN") &&
                        <div><button className="danger" onClick={handleDelete}>Delete</button></div>}
                    {error && <div className="error">{error}</div>}
                </div>
            );
        }

        function AdminCreate({ token, onBack, onCreated }) {
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirm, setConfirm] = useState("");
            const [error, setError] = useState(null);

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                if (password !== confirm) {
                    setError("Passwords do not match");
                    return;
                }
                try {
                    const res = await fetch("/admin/admins", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token,
                        },
                        body: JSON.stringify({ admin: { name, email, phone }, password }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onCreated();
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not create admin");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to admins</button>
                    <h1>Add Admin</h1>
                    <form onSubmit={handleSubmit}>
                        <input type="text" placeholder="Name" value={name}
                               onChange={(e) => setName(e.target.value)} />
                        <input type="tel" placeholder="Phone" value={phone}
                               onChange={(e) => setPhone(e.target.value)} />
                        <input type="email" placeholder="Email" value={email}
                               onChange={(e) => setEmail(e.target.value)} />
                        <input type="password" placeholder="Password" value={password}
                               onChange={(e) => setPassword(e.target.value)} />
                        <input type="password" placeholder="Confirm password" value={confirm}
                               onChange={(e) => setConfirm(e.target.value)} />
                        <button type="submit">Create</button>
                        {error && <div className="error">{error}</div>}
                    </form>
                </div>
            );
        }

        function AdminsPage({ token, currentAdmin }) {
            const [admins, setAdmins] = useState(null);
            const [error, setError] = useState(null);
            const [selected, setSelected] = useState(null);
            const [creating, setCreating] = useState(false);

            async function load() {
                setError(null);
                try {
                    const res = await fetch("/admin/admins", {
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        setAdmins(body.data);
                    } else {
                        setError((body.errors && body.errors[0]) || "Could not load admins");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            useEffect(() => { load(); }, [token]);

            if (creating) {
                return (
                    <AdminCreate
                        token={token}
                        onBack={() => setCreating(false)}
                        onCreated={() => { setCreating(false); load(); }}
                    />
                );
            }

            if (selected) {
                return (
                    <AdminDetail
                        admin={selected}
                        currentAdmin={currentAdmin}
                        token={token}
                        onBack={() => setSelected(null)}
                        onSaved={() => { setSelected(null); load(); }}
                        onDeleted={() => { setSelected(null); load(); }}
                    />
                );
            }

            return (
                <div>
                    <h1>Admins</h1>
                    {currentAdmin.permissions.includes("CREATE_ADMIN") &&
                        <div style={{ marginBottom: "12px" }}><button onClick={() => setCreating(true)}>Add New</button></div>}
                    {error && <div className="error">{error}</div>}
                    {!admins && !error && <div>Loading…</div>}
                    {admins && admins.map((a) => (
                        <div className="admin-row" key={a.id} onClick={() => setSelected(a)}>
                            <span className="name">{a.name}</span>
                            <span className="meta"> — {a.email} — {a.phone}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function OrganizationDetail({ org, currentAdmin, token, onBack, onSaved, onDeleted }) {
            const canEdit = currentAdmin.permissions.includes("EDIT_ORG") || currentAdmin.permissions.includes("CREATE_ORG");
            const canDelete = currentAdmin.permissions.includes("DELETE_ORG");
            const [name, setName] = useState(org.name || "");
            const [locale, setLocale] = useState(org.defaultLocale || "");
            const [error, setError] = useState(null);

            async function handleSave() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + org.id, {
                        method: "PATCH",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token,
                        },
                        body: JSON.stringify({ organization: { name, defaultLocale: locale } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onSaved();
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not save organization");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            async function handleDelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + org.id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onDeleted();
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not delete organization");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            async function handleUndelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + org.id, {
                        method: "PATCH",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token,
                        },
                        body: JSON.stringify({ organization: { isDeleted: false } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onSaved();
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not undelete organization");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to organizations</button>
                    <div className="detail-header">
                        <h1>Edit Organization</h1>
                        {canEdit && <button onClick={handleSave}>Save</button>}
                    </div>
                    <div className="edit-form">
                        <label>Name
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                        </label>
                        <label>Default locale
                            <input type="text" value={locale} onChange={(e) => setLocale(e.target.value)} />
                        </label>
                    </div>
                    {canDelete && (
                        <div>
                            {org.isDeleted
                                ? <button onClick={handleUndelete}>Undelete</button>
                                : <button className="danger" onClick={handleDelete}>Delete</button>}
                        </div>
                    )}
                    {error && <div className="error">{error}</div>}
                </div>
            );
        }

        function OrganizationCreate({ token, onBack, onCreated }) {
            const [name, setName] = useState("");
            const [locale, setLocale] = useState("");
            const [error, setError] = useState(null);

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                try {
                    const res = await fetch("/admin/organizations", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token,
                        },
                        body: JSON.stringify({ organization: { name, defaultLocale: locale } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        onCreated();
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not create organization");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to organizations</button>
                    <h1>Add Organization</h1>
                    <form onSubmit={handleSubmit}>
                        <input type="text" placeholder="Name" value={name}
                               onChange={(e) => setName(e.target.value)} />
                        <input type="text" placeholder="Default locale" value={locale}
                               onChange={(e) => setLocale(e.target.value)} />
                        <button type="submit">Create</button>
                        {error && <div className="error">{error}</div>}
                    </form>
                </div>
            );
        }

        function OrganizationsPage({ token, currentAdmin }) {
            const [orgs, setOrgs] = useState(null);
            const [error, setError] = useState(null);
            const [selected, setSelected] = useState(null);
            const [creating, setCreating] = useState(false);

            async function load() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations", {
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        setOrgs(body.data);
                    } else {
                        setError((body.errors && body.errors[0]) || "Could not load organizations");
                    }
                } catch (err) {
                    setError("Could not reach the server");
                }
            }

            useEffect(() => { load(); }, [token]);

            if (creating) {
                return (
                    <OrganizationCreate
                        token={token}
                        onBack={() => setCreating(false)}
                        onCreated={() => { setCreating(false); load(); }}
                    />
                );
            }

            if (selected) {
                return (
                    <OrganizationDetail
                        org={selected}
                        currentAdmin={currentAdmin}
                        token={token}
                        onBack={() => setSelected(null)}
                        onSaved={() => { setSelected(null); load(); }}
                        onDeleted={() => { setSelected(null); load(); }}
                    />
                );
            }

            return (
                <div>
                    <h1>Organizations</h1>
                    {currentAdmin.permissions.includes("CREATE_ORG") &&
                        <div style={{ marginBottom: "12px" }}><button onClick={() => setCreating(true)}>Add New</button></div>}
                    {error && <div className="error">{error}</div>}
                    {!orgs && !error && <div>Loading…</div>}
                    {orgs && orgs.map((o) => (
                        <div className={"admin-row" + (o.isDeleted ? " deleted" : "")} key={o.id} onClick={() => setSelected(o)}>
                            <span className="name">{o.name}</span>
                            <span className="meta"> — {o.defaultLocale}</span>
                            <span className="deleted-tag">{o.isDeleted ? "Deleted" : ""}</span>
                        </div>
                    ))}
                </div>
            );
        }

        const ALL_PERMISSIONS = [
            "CREATE_ORG", "DELETE_ORG", "EDIT_ORG",
            "CREATE_ADMIN", "DELETE_ADMIN", "ASSIGN_ADMIN_ROLES",
        ];

        function PermissionChecklist({ selected, onToggle }) {
            return (
                <div className="edit-form">
                    {ALL_PERMISSIONS.map((p) => (
                        <label key={p} style={{ flexDirection: "row", alignItems: "center", gap: "8px" }}>
                            <input type="checkbox" checked={selected.includes(p)} onChange={() => onToggle(p)} />
                            {p}
                        </label>
                    ))}
                </div>
            );
        }

        function RoleDetail({ role, currentAdmin, token, onBack, onSaved, onDeleted }) {
            const canAssign = currentAdmin.permissions.includes("ASSIGN_ADMIN_ROLES");
            const [name, setName] = useState(role.name || "");
            const [perms, setPerms] = useState(role.permissions || []);
            const [error, setError] = useState(null);

            function toggle(p) {
                setPerms((prev) => prev.includes(p) ? prev.filter((x) => x !== p) : [...prev, p]);
            }

            async function handleSave() {
                setError(null);
                try {
                    const res = await fetch("/admin/roles/" + role.id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ role: { name, permissions: perms } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onSaved(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not save role"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function handleDelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/roles/" + role.id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onDeleted(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not delete role"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to roles</button>
                    <div className="detail-header">
                        <h1>Edit Role</h1>
                        {canAssign && <button onClick={handleSave}>Save</button>}
                    </div>
                    <div className="edit-form">
                        <label>Name
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                        </label>
                    </div>
                    <h3>Permissions</h3>
                    <PermissionChecklist selected={perms} onToggle={toggle} />
                    {canAssign &&
                        <div><button className="danger" onClick={handleDelete}>Delete</button></div>}
                    {error && <div className="error">{error}</div>}
                </div>
            );
        }

        function RoleCreate({ token, onBack, onCreated }) {
            const [name, setName] = useState("");
            const [perms, setPerms] = useState([]);
            const [error, setError] = useState(null);

            function toggle(p) {
                setPerms((prev) => prev.includes(p) ? prev.filter((x) => x !== p) : [...prev, p]);
            }

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                try {
                    const res = await fetch("/admin/roles", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ role: { name, permissions: perms } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onCreated(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not create role"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to roles</button>
                    <h1>Add Role</h1>
                    <form onSubmit={handleSubmit}>
                        <input type="text" placeholder="Name" value={name}
                               onChange={(e) => setName(e.target.value)} />
                        <h3>Permissions</h3>
                        <PermissionChecklist selected={perms} onToggle={toggle} />
                        <button type="submit">Create</button>
                        {error && <div className="error">{error}</div>}
                    </form>
                </div>
            );
        }

        function RolesPage({ token, currentAdmin }) {
            const [roles, setRoles] = useState(null);
            const [error, setError] = useState(null);
            const [selected, setSelected] = useState(null);
            const [creating, setCreating] = useState(false);

            async function load() {
                setError(null);
                try {
                    const res = await fetch("/admin/roles", {
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { setRoles(body.data); }
                    else { setError((body.errors && body.errors[0]) || "Could not load roles"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            useEffect(() => { load(); }, [token]);

            if (creating) {
                return (
                    <RoleCreate
                        token={token}
                        onBack={() => setCreating(false)}
                        onCreated={() => { setCreating(false); load(); }}
                    />
                );
            }

            if (selected) {
                return (
                    <RoleDetail
                        role={selected}
                        currentAdmin={currentAdmin}
                        token={token}
                        onBack={() => setSelected(null)}
                        onSaved={() => { setSelected(null); load(); }}
                        onDeleted={() => { setSelected(null); load(); }}
                    />
                );
            }

            return (
                <div>
                    <h1>Roles</h1>
                    {currentAdmin.permissions.includes("ASSIGN_ADMIN_ROLES") &&
                        <div style={{ marginBottom: "12px" }}><button onClick={() => setCreating(true)}>Add New</button></div>}
                    {error && <div className="error">{error}</div>}
                    {!roles && !error && <div>Loading…</div>}
                    {roles && roles.map((r) => (
                        <div className="admin-row" key={r.id} onClick={() => setSelected(r)}>
                            <span className="name">{r.name}</span>
                            <span className="meta"> — {r.permissions.join(", ")}</span>
                        </div>
                    ))}
                </div>
            );
        }

        const ITEM_TYPES = ["WASH_AND_FOLD", "DRY_CLEANING", "OTHER"];

        function ItemDetail({ orgId, item, currentAdmin, token, onBack, onSaved, onDeleted }) {
            const canEdit = currentAdmin.permissions.includes("EDIT_ORG") || currentAdmin.permissions.includes("CREATE_ORG");
            const [price, setPrice] = useState(item.price || "");
            const [itemType, setItemType] = useState(item.itemType || "DRY_CLEANING");
            const [names, setNames] = useState(item.names || []);
            const [newName, setNewName] = useState("");
            const [newLocale, setNewLocale] = useState("");
            const [error, setError] = useState(null);

            const namesUrl = "/admin/organizations/" + orgId + "/items/" + item.id + "/names";

            function updateNameField(id, field, value) {
                setNames((prev) => prev.map((n) => n.id === id ? { ...n, [field]: value } : n));
            }

            async function saveName(n) {
                setError(null);
                try {
                    const res = await fetch(namesUrl + "/" + n.id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ name: n.name, locale: n.locale }),
                    });
                    const body = await res.json();
                    if (body.errorType !== "NONE") {
                        setError((body.errors && body.errors.join(", ")) || "Could not save name");
                    }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function deleteName(id) {
                setError(null);
                try {
                    const res = await fetch(namesUrl + "/" + id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { setNames((prev) => prev.filter((n) => n.id !== id)); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not delete name"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function addName() {
                setError(null);
                if (!newName || !newLocale) return;
                try {
                    const res = await fetch(namesUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ name: newName, locale: newLocale }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") {
                        setNames((prev) => [...prev, body.data]);
                        setNewName("");
                        setNewLocale("");
                    } else {
                        setError((body.errors && body.errors.join(", ")) || "Could not add name");
                    }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function handleSave() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + orgId + "/items/" + item.id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ item: { price, itemType } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onSaved(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not save item"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function handleDelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + orgId + "/items/" + item.id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onDeleted(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not delete item"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to items</button>
                    <div className="detail-header">
                        <h1>Edit Item</h1>
                        {canEdit && <button onClick={handleSave}>Save</button>}
                    </div>
                    <div className="edit-form">
                        <label>Price
                            <input type="text" value={price} onChange={(e) => setPrice(e.target.value)} />
                        </label>
                        <label>Type
                            <select value={itemType} onChange={(e) => setItemType(e.target.value)}>
                                {ITEM_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </label>
                    </div>
                    <h3>Names</h3>
                    {canEdit ? (
                        <div>
                            {names.map((n) => (
                                <div className="name-row" key={n.id}>
                                    <input type="text" value={n.name || ""}
                                           onChange={(e) => updateNameField(n.id, "name", e.target.value)} />
                                    <input type="text" value={n.locale || ""}
                                           onChange={(e) => updateNameField(n.id, "locale", e.target.value)} />
                                    <button type="button" onClick={() => saveName(n)}>Save</button>
                                    <button type="button" onClick={() => deleteName(n.id)}>✕</button>
                                </div>
                            ))}
                            <div className="name-row">
                                <input type="text" placeholder="Name" value={newName}
                                       onChange={(e) => setNewName(e.target.value)} />
                                <input type="text" placeholder="Locale" value={newLocale}
                                       onChange={(e) => setNewLocale(e.target.value)} />
                                <button type="button" onClick={addName}>Add</button>
                            </div>
                        </div>
                    ) : (
                        names.map((n, i) => (
                            <div className="detail-field" key={i}>{n.name} <span className="label">({n.locale})</span></div>
                        ))
                    )}
                    {canEdit && <div><button className="danger" onClick={handleDelete}>Delete</button></div>}
                    {error && <div className="error">{error}</div>}
                </div>
            );
        }

        function ItemCreate({ orgId, token, onBack, onCreated }) {
            const [price, setPrice] = useState("");
            const [itemType, setItemType] = useState("DRY_CLEANING");
            const [names, setNames] = useState([{ name: "", locale: "" }]);
            const [error, setError] = useState(null);

            function updateName(i, field, value) {
                setNames((prev) => prev.map((n, idx) => idx === i ? { ...n, [field]: value } : n));
            }
            function addName() { setNames((prev) => [...prev, { name: "", locale: "" }]); }
            function removeName(i) { setNames((prev) => prev.filter((_, idx) => idx !== i)); }

            async function handleSubmit(e) {
                e.preventDefault();
                setError(null);
                const cleanNames = names.filter((n) => n.name && n.locale);
                try {
                    const res = await fetch("/admin/organizations/" + orgId + "/items", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify({ item: { price, itemType, names: cleanNames } }),
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { onCreated(); }
                    else { setError((body.errors && body.errors.join(", ")) || "Could not create item"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to items</button>
                    <h1>Add Item</h1>
                    <form onSubmit={handleSubmit}>
                        <input type="text" placeholder="Price" value={price}
                               onChange={(e) => setPrice(e.target.value)} />
                        <select value={itemType} onChange={(e) => setItemType(e.target.value)}>
                            {ITEM_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <h3>Names</h3>
                        {names.map((n, i) => (
                            <div className="name-row" key={i}>
                                <input type="text" placeholder="Name" value={n.name}
                                       onChange={(e) => updateName(i, "name", e.target.value)} />
                                <input type="text" placeholder="Locale" value={n.locale}
                                       onChange={(e) => updateName(i, "locale", e.target.value)} />
                                <button type="button" onClick={() => removeName(i)}>✕</button>
                            </div>
                        ))}
                        <button type="button" onClick={addName}>Add name</button>
                        <button type="submit">Create</button>
                        {error && <div className="error">{error}</div>}
                    </form>
                </div>
            );
        }

        function ItemsPage({ token, currentAdmin }) {
            const canEdit = currentAdmin.permissions.includes("EDIT_ORG") || currentAdmin.permissions.includes("CREATE_ORG");
            const [orgs, setOrgs] = useState(null);
            const [orgId, setOrgId] = useState("");
            const [items, setItems] = useState(null);
            const [selected, setSelected] = useState(null);
            const [creating, setCreating] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                async function loadOrgs() {
                    try {
                        const res = await fetch("/admin/organizations", { headers: { "Authorization": "Bearer " + token } });
                        const body = await res.json();
                        if (body.errorType === "NONE") { setOrgs(body.data); }
                        else { setError((body.errors && body.errors[0]) || "Could not load organizations"); }
                    } catch (err) { setError("Could not reach the server"); }
                }
                loadOrgs();
            }, [token]);

            async function loadItems() {
                if (!orgId) { setItems(null); return; }
                setError(null);
                try {
                    const res = await fetch("/admin/organizations/" + orgId + "/items", {
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const body = await res.json();
                    if (body.errorType === "NONE") { setItems(body.data); }
                    else { setError((body.errors && body.errors[0]) || "Could not load items"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            useEffect(() => { setSelected(null); setCreating(false); loadItems(); }, [orgId]);

            if (orgId && creating) {
                return (
                    <ItemCreate
                        orgId={orgId}
                        token={token}
                        onBack={() => setCreating(false)}
                        onCreated={() => { setCreating(false); loadItems(); }}
                    />
                );
            }

            if (orgId && selected) {
                return (
                    <ItemDetail
                        orgId={orgId}
                        item={selected}
                        currentAdmin={currentAdmin}
                        token={token}
                        onBack={() => setSelected(null)}
                        onSaved={() => { setSelected(null); loadItems(); }}
                        onDeleted={() => { setSelected(null); loadItems(); }}
                    />
                );
            }

            return (
                <div>
                    <h1>Items</h1>
                    <label>Organization{" "}
                        <select value={orgId} onChange={(e) => setOrgId(e.target.value)}>
                            <option value="">Select…</option>
                            {orgs && orgs.map((o) => <option key={o.id} value={o.id}>{o.name}</option>)}
                        </select>
                    </label>
                    {orgId && canEdit &&
                        <div style={{ marginTop: "12px", marginBottom: "12px" }}>
                            <button onClick={() => setCreating(true)}>Add New</button>
                        </div>}
                    {error && <div className="error">{error}</div>}
                    {orgId && !items && !error && <div>Loading…</div>}
                    {items && items.map((it) => (
                        <div className="admin-row" key={it.id} onClick={() => setSelected(it)}>
                            <span className="name">{it.names.map((n) => n.name).join(" / ") || "(no name)"}</span>
                            <span className="meta"> — {it.itemType} — {it.price}</span>
                        </div>
                    ))}
                </div>
            );
        }

        const ORDER_STATES = [
            "SUBMITTED", "PICKUP_IN_PROGRESS", "PICKED_UP", "CLEANING",
            "AWAITING_DROP_OFF", "DROPPING_OFF", "COMPLETED",
        ];
        const ADDR_FIELDS = ["street1", "street2", "city", "state", "country", "postcode"];

        function msToInput(ms) {
            if (ms == null) return "";
            const off = new Date(ms).getTimezoneOffset() * 60000;
            return new Date(ms - off).toISOString().slice(0, 16);
        }
        function inputToMs(s) { return s ? new Date(s).getTime() : null; }
        function msToLabel(ms) { return ms == null ? "—" : new Date(ms).toLocaleString(); }

        function OrderDetail({ order, currentAdmin, token, onBack, onSaved, onDeleted }) {
            const canEdit = currentAdmin.permissions.includes("EDIT_ORG") || currentAdmin.permissions.includes("CREATE_ORG");
            const [state, setState] = useState(order.state || "SUBMITTED");
            const [pickupAt, setPickupAt] = useState(msToInput(order.scheduledPickup));
            const [dropoffAt, setDropoffAt] = useState(msToInput(order.scheduledDropoff));
            const [pickup, setPickup] = useState({ ...order.pickupAddress });
            const [dropoff, setDropoff] = useState({ ...order.dropoffAddress });
            const [lineQtys, setLineQtys] = useState(
                Object.fromEntries(order.lines.map((l) => [l.id, l.quantity || ""]))
            );
            const [error, setError] = useState(null);

            async function handleSave() {
                setError(null);
                const body = {
                    order: {
                        state,
                        scheduledPickup: inputToMs(pickupAt),
                        scheduledDropoff: inputToMs(dropoffAt),
                        pickupAddress: pickup,
                        dropoffAddress: dropoff,
                        lines: order.lines.map((l) => ({
                            id: l.id,
                            quantity: lineQtys[l.id] === "" ? null : lineQtys[l.id],
                        })),
                    },
                };
                try {
                    const res = await fetch("/admin/orders/" + order.id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                        body: JSON.stringify(body),
                    });
                    const b = await res.json();
                    if (b.errorType === "NONE") { onSaved(); }
                    else { setError((b.errors && b.errors.join(", ")) || "Could not save order"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            async function handleDelete() {
                setError(null);
                try {
                    const res = await fetch("/admin/orders/" + order.id, {
                        method: "DELETE",
                        headers: { "Authorization": "Bearer " + token },
                    });
                    const b = await res.json();
                    if (b.errorType === "NONE") { onDeleted(); }
                    else { setError((b.errors && b.errors.join(", ")) || "Could not delete order"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            function addressEditor(label, addr, setAddr) {
                return (
                    <div>
                        <h3>{label}</h3>
                        <div className="edit-form">
                            {ADDR_FIELDS.map((f) => (
                                <label key={f}>{f}
                                    <input type="text" value={addr[f] || ""}
                                           onChange={(e) => setAddr((prev) => ({ ...prev, [f]: e.target.value }))} />
                                </label>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <button className="back-link" onClick={onBack}>← Back to orders</button>
                    <div className="detail-header">
                        <h1>Edit Order</h1>
                        {canEdit && <button onClick={handleSave}>Save</button>}
                    </div>
                    <div className="edit-form">
                        <label>State
                            <select value={state} onChange={(e) => setState(e.target.value)}>
                                {ORDER_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </label>
                        <label>Scheduled pickup
                            <input type="datetime-local" value={pickupAt} onChange={(e) => setPickupAt(e.target.value)} />
                        </label>
                        <label>Scheduled dropoff
                            <input type="datetime-local" value={dropoffAt} onChange={(e) => setDropoffAt(e.target.value)} />
                        </label>
                    </div>
                    {addressEditor("Pickup address", pickup, setPickup)}
                    {addressEditor("Dropoff address", dropoff, setDropoff)}
                    <h3>Lines</h3>
                    {order.lines.map((l) => (
                        <div className="name-row" key={l.id}>
                            <span style={{ minWidth: "160px" }}>{l.name || "(item)"} ({l.itemType})</span>
                            <span>@ {l.pricePerUnit}</span>
                            <input type="text" style={{ width: "70px" }} value={lineQtys[l.id]}
                                   onChange={(e) => setLineQtys((prev) => ({ ...prev, [l.id]: e.target.value }))} />
                            <span>= {l.totalCost || "—"}</span>
                        </div>
                    ))}
                    {canEdit && <div><button className="danger" onClick={handleDelete}>Delete</button></div>}
                    {error && <div className="error">{error}</div>}
                </div>
            );
        }

        function OrdersPage({ token, currentAdmin }) {
            const [orders, setOrders] = useState(null);
            const [selected, setSelected] = useState(null);
            const [error, setError] = useState(null);

            async function load() {
                setError(null);
                try {
                    const res = await fetch("/admin/orders", { headers: { "Authorization": "Bearer " + token } });
                    const body = await res.json();
                    if (body.errorType === "NONE") { setOrders(body.data); }
                    else { setError((body.errors && body.errors[0]) || "Could not load orders"); }
                } catch (err) { setError("Could not reach the server"); }
            }

            useEffect(() => { load(); }, [token]);

            if (selected) {
                return (
                    <OrderDetail
                        order={selected}
                        currentAdmin={currentAdmin}
                        token={token}
                        onBack={() => setSelected(null)}
                        onSaved={() => { setSelected(null); load(); }}
                        onDeleted={() => { setSelected(null); load(); }}
                    />
                );
            }

            return (
                <div>
                    <h1>Orders</h1>
                    {error && <div className="error">{error}</div>}
                    {!orders && !error && <div>Loading…</div>}
                    {orders && orders.map((o) => (
                        <div className="admin-row" key={o.id} onClick={() => setSelected(o)}>
                            <span className="name">{o.state}</span>
                            <span className="meta"> — pickup {msToLabel(o.scheduledPickup)} — {o.lines.length} item(s)</span>
                        </div>
                    ))}
                </div>
            );
        }

        const PAGES = [
            { key: "admins", label: "Admins" },
            { key: "roles", label: "Roles" },
            { key: "organizations", label: "Organizations" },
            { key: "orders", label: "Orders" },
        ];

        const SUBNAV_PAGES = [
            { key: "items", label: "Items" },
        ];

        function pageVisible(key, perms) {
            const has = (p) => perms.includes(p);
            if (key === "admins") return has("CREATE_ADMIN") || has("DELETE_ADMIN") || has("ASSIGN_ADMIN_ROLES");
            if (key === "organizations") return has("CREATE_ORG") || has("DELETE_ORG") || has("EDIT_ORG");
            if (key === "items") return has("CREATE_ORG") || has("DELETE_ORG") || has("EDIT_ORG");
            if (key === "orders") return has("CREATE_ORG") || has("DELETE_ORG") || has("EDIT_ORG");
            if (key === "roles") return has("ASSIGN_ADMIN_ROLES");
            return true;
        }

        function Shell({ token, currentAdmin }) {
            const perms = currentAdmin.permissions || [];
            const visiblePages = PAGES.filter((p) => pageVisible(p.key, perms));
            const visibleSubnav = SUBNAV_PAGES.filter((p) => pageVisible(p.key, perms));
            const allVisible = [...visiblePages, ...visibleSubnav];
            const [page, setPage] = useState(allVisible.length ? allVisible[0].key : null);

            return (
                <div className="shell">
                    <nav className="navbar">
                        {visiblePages.map((p) => (
                            <button
                                key={p.key}
                                className={"nav-item" + (page === p.key ? " active" : "")}
                                onClick={() => setPage(p.key)}
                            >
                                {p.label}
                            </button>
                        ))}
                        {visibleSubnav.length > 0 && <div className="nav-subheader">Catalog</div>}
                        {visibleSubnav.map((p) => (
                            <button
                                key={p.key}
                                className={"nav-item sub" + (page === p.key ? " active" : "")}
                                onClick={() => setPage(p.key)}
                            >
                                {p.label}
                            </button>
                        ))}
                    </nav>
                    <main className="content">
                        {page === "admins" && <AdminsPage token={token} currentAdmin={currentAdmin} />}
                        {page === "roles" && <RolesPage token={token} currentAdmin={currentAdmin} />}
                        {page === "organizations" && <OrganizationsPage token={token} currentAdmin={currentAdmin} />}
                        {page === "orders" && <OrdersPage token={token} currentAdmin={currentAdmin} />}
                        {page === "items" && <ItemsPage token={token} currentAdmin={currentAdmin} />}
                    </main>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(null);
            const [currentAdmin, setCurrentAdmin] = useState(null);
            if (!token) {
                return <LoginApp onLogin={(session, admin) => { setToken(session); setCurrentAdmin(admin); }} />;
            }
            return <Shell token={token} currentAdmin={currentAdmin} />;
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
